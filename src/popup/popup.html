<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NetflixRating Settings</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <header class="header">
      <h1>NetflixRating</h1>
      <p class="subtitle">IMDb &middot; Rotten Tomatoes &middot; Letterboxd</p>
    </header>

    <!-- API Key Section -->
    <section class="section">
      <h2>OMDb API Key</h2>
      <div class="api-key-row">
        <input type="text" id="apiKey" placeholder="e.g. a1b2c3d4" spellcheck="false" autocomplete="off">
        <button id="saveKey" class="btn btn-primary">Save</button>
      </div>
      <p class="hint">
        <a href="https://www.omdbapi.com/apikey.aspx" target="_blank" rel="noopener">Get a free API key</a>
        (1,000 req/day) — activate via email before use. Enter just the key, not the full URL
      </p>
      <div id="keyStatus" class="status hidden"></div>
    </section>

    <!-- Rating Sources -->
    <section class="section">
      <h2>Rating Sources</h2>
      <label class="toggle-row">
        <span class="toggle-label">
          <img class="source-logo" src="../assets/imdb.svg" alt="IMDb">
          IMDb Rating
        </span>
        <input type="checkbox" id="showImdb" checked>
        <span class="toggle-switch"></span>
      </label>
      <label class="toggle-row">
        <span class="toggle-label">
          <img class="source-logo source-logo-rt" src="../assets/rt-fresh.svg" alt="RT">
          Rotten Tomatoes
        </span>
        <input type="checkbox" id="showRottenTomatoes" checked>
        <span class="toggle-switch"></span>
      </label>
      <div class="sub-option" id="rtScoreOptions">
        <div class="radio-group">
          <label class="radio-row">
            <input type="radio" name="rtScoreType" value="audience" checked>
            <span>Audience</span>
          </label>
          <label class="radio-row">
            <input type="radio" name="rtScoreType" value="critics">
            <span>Critics</span>
          </label>
          <label class="radio-row">
            <input type="radio" name="rtScoreType" value="both">
            <span>Both</span>
          </label>
        </div>
      </div>
      <label class="toggle-row">
        <span class="toggle-label">
          <img class="source-logo source-logo-lb" src="../assets/letterboxd.svg" alt="Letterboxd">
          Letterboxd
        </span>
        <input type="checkbox" id="showLetterboxd" checked>
        <span class="toggle-switch"></span>
      </label>
    </section>

    <!-- Display Style -->
    <section class="section">
      <h2>Display</h2>
      <div class="radio-group">
        <label class="radio-row">
          <input type="radio" name="displayStyle" value="compact" checked>
          <span>Compact</span>
        </label>
        <label class="radio-row">
          <input type="radio" name="displayStyle" value="detailed">
          <span>Detailed</span>
        </label>
      </div>
    </section>

    <!-- Usage & Cache -->
    <section class="section">
      <h2>Usage</h2>
      <div class="stats-grid">
        <div class="stat">
          <span class="stat-value" id="apiUsage">0</span>
          <span class="stat-label">API calls today</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="cacheCount">0</span>
          <span class="stat-label">cached titles</span>
        </div>
      </div>
      <div id="usageWarning" class="warning hidden">
        Approaching daily API limit (1,000)
      </div>
      <button id="clearCache" class="btn btn-secondary">Clear Cache</button>
    </section>

    <footer class="footer">
      <p>v1.0.0</p>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
